<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YTDL Premiere</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>YTDL Premiere</h1>
        <span id="serviceState" class="state">Checking</span>
      </header>

      <label for="urlInput">URL</label>
      <textarea id="urlInput" rows="3" spellcheck="false"></textarea>
      <p id="urlHint" class="hint"></p>

      <label for="outputInput">Destination folder</label>
      <input id="outputInput" type="text" spellcheck="false" placeholder="X:\Projects\ClientOrShow\incoming">

      <label class="check">
        <input id="notifyInput" type="checkbox">
        Notify when jobs finish
      </label>

      <button id="submitButton" type="button">Download + Transcode</button>

      <section id="queuePanel" class="panel">
        <div class="panelHeader">
          <strong>Queue</strong>
          <span>Latest jobs</span>
        </div>
        <div id="jobList" class="jobList"></div>
      </section>

      <p id="message" class="message"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
